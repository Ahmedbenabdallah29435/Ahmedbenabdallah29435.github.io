<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Ahmed Ben Abdallah — interactive 2D portfolio game" />
    <title>Ahmed Ben Abdallah — 2D Portfolio</title>
  </head>
  <body>
    <style>
      @font-face {
        font-family: "Monogram";
        src: url("/monogram.ttf") format("truetype");
        font-display: swap;
      }

      :root {
        --bg-deep: #0b0b1e;
        --bg-mid: #171034;
        --accent: #ffd166;
        --accent-soft: rgba(255, 209, 102, 0.35);
        --cyan: #4ecdc4;
        --text: #f4f1ea;
        --text-dim: #b8b2cf;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
      }

      body {
        font-family: "Monogram", monospace;
        font-size: 2rem;
        overflow: hidden;
        background: var(--bg-deep);
      }

      #app {
        width: 100%;
        height: 100%;
        position: relative;
      }

      /* ============ MENU OVERLAY ============ */
      #menu {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        padding: 1.5rem;
        background:
          radial-gradient(ellipse 80% 60% at 50% -10%, rgba(78, 205, 196, 0.14), transparent),
          radial-gradient(ellipse 70% 50% at 50% 110%, rgba(255, 209, 102, 0.10), transparent),
          linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-mid) 55%, var(--bg-deep) 100%);
        opacity: 1;
        transition: opacity 0.6s ease, visibility 0.6s;
      }

      #menu.menu--hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Twinkling pixel stars (populated by JS) */
      .menu-stars {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .star {
        position: absolute;
        width: 3px;
        height: 3px;
        background: #fff;
        image-rendering: pixelated;
        animation: twinkle var(--dur, 3s) ease-in-out infinite;
        animation-delay: var(--delay, 0s);
        opacity: 0.7;
      }

      .star--accent { background: var(--accent); }
      .star--cyan { background: var(--cyan); }

      @keyframes twinkle {
        0%, 100% { opacity: 0.15; transform: scale(1); }
        50% { opacity: 0.9; transform: scale(1.4); }
      }

      /* Menu card */
      .menu-card {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 0.4rem;
        max-width: 34rem;
        width: 100%;
        padding: 2.5rem 2rem 2.25rem;
        background: rgba(13, 11, 33, 0.72);
        border: 2px solid rgba(255, 255, 255, 0.10);
        border-radius: 14px;
        box-shadow:
          0 0 0 4px rgba(0, 0, 0, 0.25),
          0 24px 60px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(8px);
        animation: card-in 0.7s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes card-in {
        from { opacity: 0; transform: translateY(24px) scale(0.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      .menu-eyebrow {
        margin: 0;
        font-size: 1.1rem;
        letter-spacing: 0.45em;
        text-transform: uppercase;
        color: var(--cyan);
      }

      .menu-title {
        margin: 0.1rem 0 0;
        font-size: clamp(3rem, 9vw, 4.6rem);
        line-height: 1;
        font-weight: 400;
        color: var(--text);
        text-shadow:
          0 0 18px var(--accent-soft),
          3px 3px 0 rgba(0, 0, 0, 0.6);
        animation: title-glow 3.2s ease-in-out infinite;
      }

      .menu-title .accent { color: var(--accent); }

      @keyframes title-glow {
        0%, 100% { text-shadow: 0 0 12px var(--accent-soft), 3px 3px 0 rgba(0,0,0,0.6); }
        50% { text-shadow: 0 0 26px var(--accent-soft), 0 0 46px rgba(78,205,196,0.25), 3px 3px 0 rgba(0,0,0,0.6); }
      }

      .menu-sub {
        margin: 0.5rem 0 1.1rem;
        font-size: 1.35rem;
        line-height: 1.45;
        color: var(--text-dim);
        max-width: 26rem;
      }

      .menu-sub strong { color: var(--accent); font-weight: 400; }

      /* Buttons */
      .menu-btn {
        font-family: "Monogram", monospace;
        font-size: 1.5rem;
        color: var(--text);
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        padding: 0.55rem 1.3rem;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: transform 0.15s ease, box-shadow 0.15s ease,
                    border-color 0.15s ease, background 0.15s ease;
        user-select: none;
      }

      .menu-btn:hover, .menu-btn:focus-visible {
        transform: translateY(-2px);
        border-color: var(--cyan);
        background: rgba(78, 205, 196, 0.10);
        box-shadow: 0 6px 20px rgba(78, 205, 196, 0.22);
        outline: none;
      }

      .menu-btn:active { transform: translateY(1px); }

      .menu-btn--primary {
        font-size: 2rem;
        padding: 0.7rem 2.4rem;
        color: #1a1400;
        background: linear-gradient(180deg, #ffe29a 0%, var(--accent) 60%, #f0b429 100%);
        border-color: #ffe9b0;
        box-shadow:
          0 0 24px var(--accent-soft),
          0 6px 0 #a97b12,
          0 12px 24px rgba(0, 0, 0, 0.45);
        animation: pulse 2.2s ease-in-out infinite;
      }

      .menu-btn--primary:hover, .menu-btn--primary:focus-visible {
        transform: translateY(-3px);
        border-color: #fff3cf;
        background: linear-gradient(180deg, #fff0bd 0%, #ffd97a 60%, #f5bd35 100%);
        box-shadow:
          0 0 40px var(--accent-soft),
          0 8px 0 #a97b12,
          0 16px 30px rgba(0, 0, 0, 0.5);
        animation-play-state: paused;
      }

      .menu-btn--primary:active {
        transform: translateY(3px);
        box-shadow: 0 0 18px var(--accent-soft), 0 2px 0 #a97b12;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.035); }
      }

      .menu-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.75rem;
        margin-top: 1.2rem;
      }

      .menu-btn--locked {
        color: var(--text-dim);
        border-style: dashed;
        cursor: not-allowed;
      }

      .menu-btn--locked:hover {
        border-color: #e05656;
        background: rgba(224, 86, 86, 0.08);
        box-shadow: 0 6px 20px rgba(224, 86, 86, 0.18);
      }

      .menu-btn--unlocked {
        border-color: var(--accent);
        color: var(--accent);
        cursor: pointer;
        border-style: solid;
      }

      .shake { animation: shake 0.4s ease; }

      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-6px); }
        40% { transform: translateX(6px); }
        60% { transform: translateX(-4px); }
        80% { transform: translateX(4px); }
      }

      .menu-hint {
        margin: 1.4rem 0 0;
        font-size: 1.05rem;
        color: var(--text-dim);
        opacity: 0.8;
      }

      .menu-hint kbd {
        font-family: inherit;
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 4px;
        padding: 0 0.35rem;
        background: rgba(255, 255, 255, 0.06);
      }

      .menu-footer {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.2rem;
        color: var(--text-dim);
        font-size: 1.05rem;
        opacity: 0.85;
      }

      .menu-footer img { max-height: 28px; }

      @media (prefers-reduced-motion: reduce) {
        .star, .menu-title, .menu-btn--primary { animation: none; }
        .menu-card { animation-duration: 0.01s; }
      }

      @media (max-width: 480px) {
        .menu-card { padding: 1.8rem 1.1rem; }
        .menu-sub { font-size: 1.15rem; }
        .menu-btn--primary { font-size: 1.7rem; padding: 0.6rem 1.6rem; }
      }

      /* ============ IN-GAME UI ============ */
      #textbox-container { display: none; }

      #textbox {
        position: absolute;
        left: 10%;
        right: 10%;
        bottom: 2vh;
        min-height: 10vh;
        background: white;
        border-radius: 3px;
        outline-style: solid;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        flex-wrap: wrap;
        justify-content: flex-start;
        align-items: flex-start;
        word-spacing: 0.2rem;
        filter: drop-shadow(0 0 0.75rem rgb(112, 112, 112));
      }

      .ui-text {
        margin: 0;
        user-select: none;
      }

      .ui-close-btn {
        font-family: "Monogram", monospace;
        border-style: none;
        border-radius: 3px;
        padding: 1rem;
        font-size: inherit;
        cursor: pointer;
      }

      .btn-container {
        align-self: flex-end;
        margin-top: 1rem;
      }

      #music-toggle {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 40;
        width: 52px;
        height: 52px;
        display: none; /* shown once the game starts */
        align-items: center;
        justify-content: center;
        font-size: 1.6rem;
        color: var(--text);
        background: rgba(13, 11, 33, 0.75);
        border: 2px solid rgba(255, 255, 255, 0.25);
        border-radius: 50%;
        cursor: pointer;
        backdrop-filter: blur(6px);
        transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      }

      #music-toggle:hover {
        transform: scale(1.08);
        border-color: var(--accent);
        box-shadow: 0 0 16px var(--accent-soft);
      }

      #music-toggle.is-visible { display: inline-flex; }
    </style>

    <div id="app">
      <!-- ============ MAIN MENU ============ -->
      <div id="menu">
        <div class="menu-stars" aria-hidden="true"></div>

        <div class="menu-card">
          <p class="menu-eyebrow">Ahmed Ben Abdallah</p>
          <h1 class="menu-title">2D <span class="accent">Portfolio</span></h1>
          <p class="menu-sub">
            Learn about me through a mini 2D game.<br />
            Interact with <strong>5 objects</strong> to unlock my real portfolio!
          </p>

          <button id="start-btn" class="menu-btn menu-btn--primary">▶ Start Adventure</button>

          <div class="menu-links">
            <a class="menu-btn" href="https://github.com/Ahmedbenabdallah29435/" target="_blank" rel="noopener">🤖 GitHub</a>
            <a class="menu-btn" href="https://www.linkedin.com/in/benabdallah-ahmed-928199215/" target="_blank" rel="noopener">💼 LinkedIn</a>
            <button id="portfolio-btn" class="menu-btn menu-btn--locked">🔒 Portfolio</button>
          </div>

          <p class="menu-hint">
            Move with <kbd>←</kbd><kbd>↑</kbd><kbd>↓</kbd><kbd>→</kbd> or the mouse ·
            <kbd>Enter</kbd> closes dialogue
          </p>
        </div>

        <div class="menu-footer" id="visitor-counter">
          <span>Visitors</span>
          <img src="https://profile-counter.glitch.me/Ahmedbenabdallah29435/count.svg" alt="Visitor counter" />
        </div>
      </div>

      <!-- ============ IN-GAME OVERLAYS ============ -->
      <button id="music-toggle" aria-label="Toggle music" title="Toggle music">🔊</button>

      <div id="textbox-container">
        <div id="textbox">
          <p id="dialogue" class="ui-text"></p>
          <div class="btn-container">
            <button id="close" class="ui-close-btn">Close</button>
          </div>
        </div>
      </div>

      <canvas id="game"></canvas>
    </div>

    <script type="module" src="src/main.js"></script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-H51PDS526K"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-H51PDS526K');
    </script>
  </body>
</html>
